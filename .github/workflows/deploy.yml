# Required GitHub secrets:
# SUPABASE_ACCESS_TOKEN -> dashboard.supabase.com -> Account -> Access Tokens
# SUPABASE_PROJECT_ID   -> Settings -> General -> Reference ID
# SUPABASE_DB_PASSWORD  -> Settings -> Database -> Database password
# SUPABASE_DB_HOST      -> Settings -> Database -> Connection string -> Host
# VERCEL_TOKEN          -> vercel.com -> Account Settings -> Tokens
# VERCEL_ORG_ID         -> vercel whoami --token=TON_TOKEN
# VERCEL_PROJECT_ID     -> vercel.com -> projet -> Settings -> General

name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag à déployer (ex: v0.2.1) pour un rollback ciblé"
        required: true
        type: string

# Ce workflow est déclenché par release.yml qui crée automatiquement un tag
# SemVer à chaque merge de main-dev → main. Chaîne : merge PR → tag → deploy.
# Pour un rollback : lancer ce workflow manuellement avec le tag d'une version stable.

# Sérialise les déploiements production : impossible de pousser 2 tags en parallèle
# et de créer une race condition entre migrations et build Vercel.
concurrency:
  group: deploy-production
  cancel-in-progress: false

# Principe du moindre privilège : le workflow lit le code, c'est tout.
# Les credentials externes (Supabase, Vercel) viennent des secrets.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  # Piné pour reproductibilité — à mettre à jour explicitement quand nécessaire.
  VERCEL_CLI_VERSION: "39.3.0"

jobs:
  deploy-database:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply production migrations
        run: |
          supabase db push \
            --db-url "postgresql://postgres.${{ secrets.SUPABASE_PROJECT_ID }}:${{ secrets.SUPABASE_DB_PASSWORD }}@${{ secrets.SUPABASE_DB_HOST }}:6543/postgres"

  deploy-vercel:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-database
    # VERCEL_TOKEN dans env : la CLI Vercel le lit automatiquement, plus besoin de --token.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Vercel CLI
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel artifact
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [deploy-database, deploy-vercel]
    if: always()

    steps:
      - name: Show deployment summary
        run: |
          echo "deploy-database: ${{ needs.deploy-database.result }}"
          echo "deploy-vercel: ${{ needs.deploy-vercel.result }}"

          if [ "${{ needs.deploy-database.result }}" = "success" ] && [ "${{ needs.deploy-vercel.result }}" = "success" ]; then
            echo "Production deployment succeeded."
          else
            echo "Production deployment failed."
            exit 1
          fi
