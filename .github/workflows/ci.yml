name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  enforce-main-pr-source:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}

    steps:
      - name: Ensure PR to main comes from main-dev
        run: |
          if [ "${{ github.head_ref }}" != "main-dev" ]; then
            echo "Pull requests targeting main must come from main-dev. Current source: ${{ github.head_ref }}"
            exit 1
          fi

  lint-and-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Lint with zero warnings
        run: pnpm exec eslint . --max-warnings=0

      - name: Format check
        run: pnpm dlx prettier@3.6.2 --check .

  test-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase local stack
        run: npx supabase start

      - name: Reset local database with migrations
        run: npx supabase db reset --local --yes --no-seed

      - name: Verify generated types are up to date
        run: |
          npx supabase gen types typescript --local --schema public > /tmp/database.types.generated.ts
          diff -u lib/database.types.ts /tmp/database.types.generated.ts

      - name: Stop Supabase local stack
        if: always()
        run: npx supabase stop

  check-pending-migrations:
    runs-on: ubuntu-latest
    # Vérifie que toutes les migrations présentes dans supabase/migrations/
    # ont bien été appliquées en production. Échoue si des migrations sont en
    # attente, évitant ainsi le désynchronisation DB ↔ code (ex: trigger
    # orphelin "on_candidate_created" → wallets inexistant → signup candidat KO).
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Check for unapplied migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          STATUS=$(supabase migration list \
            --db-url "postgresql://postgres.${{ secrets.SUPABASE_PROJECT_ID }}:${{ secrets.SUPABASE_DB_PASSWORD }}@${{ secrets.SUPABASE_DB_HOST }}:6543/postgres" \
            2>&1)
          echo "$STATUS"
          if echo "$STATUS" | grep -q "│ ○ │"; then
            echo ""
            echo "⚠️  Des migrations sont en attente en production !"
            echo "   Lance 'Deploy Production' manuellement ou pousse un tag vX.Y.Z."
            exit 1
          fi
          echo "✓ Toutes les migrations sont à jour en production."

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-types]
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci_dummy_publishable_key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: ci_dummy_service_role_key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
