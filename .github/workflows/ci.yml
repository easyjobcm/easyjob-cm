name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enforce-main-pr-source:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}

    steps:
      - name: Ensure PR to main comes from main-dev
        run: |
          if [ "${{ github.head_ref }}" != "main-dev" ]; then
            echo "Pull requests targeting main must come from main-dev. Current source: ${{ github.head_ref }}"
            exit 1
          fi

  lint-and-types:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Lint with zero warnings
        run: pnpm exec eslint . --max-warnings=0

      - name: Format check
        run: pnpm dlx prettier@3.6.2 --check .

  test-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Reset local database with migrations
        run: supabase db reset --local --yes --no-seed

      - name: Verify generated types are up to date
        run: |
          supabase gen types typescript --local --schema public > /tmp/database.types.generated.ts
          diff -u lib/database.types.ts /tmp/database.types.generated.ts

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-types]
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci_dummy_publishable_key
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: ci_dummy_service_role_key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
