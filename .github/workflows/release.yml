name: Release

# Chaîne de déploiement complète :
#   merge main-dev → main  →  release.yml crée tag + GitHub Release
#                           →  deploy.yml se déclenche sur le tag
#                           →  supabase db push  PUIS  vercel deploy
#
# Type de bump SemVer déterminé :
#   - sur push direct  →  patch (défaut)
#   - workflow_dispatch →  choisir patch / minor / major

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: "Type de bump SemVer"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Marquer comme pre-release"
        required: false
        default: false
        type: boolean

# Sérialise les releases : impossible que deux push rapides créent deux releases
# avec un conflit sur la version (npm version échouerait au 2ème).
concurrency:
  group: release
  cancel-in-progress: false

# Nécessite un secret GH_PAT (Personal Access Token classique) avec les scopes :
#   repo      — pour pousser le commit de version et le tag
#   workflow  — pour que le tag puisse déclencher deploy.yml
# Créer sur github.com → Settings → Developer settings → Personal access tokens (classic)
# Puis ajouter en secret repo sous le nom GH_PAT.

# Le PAT fournit les permissions nécessaires pour push/tag/release.
# Le GITHUB_TOKEN n'est pas utilisé.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Évite la boucle infinie : le bot pousse "chore(release):" sur main,
    # ce qui déclencherait à nouveau ce workflow sans cette garde.
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' &&
       github.actor != 'github-actions[bot]' &&
       !startsWith(github.event.head_commit.message, 'chore(release):'))

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> $GITHUB_OUTPUT
            echo "prerelease=${{ inputs.prerelease }}" >> $GITHUB_OUTPUT
          else
            # Push direct sur main : patch par défaut.
            # Pour minor/major, utiliser le workflow_dispatch manuel.
            echo "bump=patch" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version in package.json
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump_type.outputs.bump }} --no-git-tag-version)
          pnpm install --lockfile-only
          echo "tag=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit, tag and push
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.bump_type.outputs.prerelease }}
          target_commitish: main
          token: ${{ secrets.GH_PAT }}
